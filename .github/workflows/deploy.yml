name: Deploy Survey App to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        working-directory: frontend
        run: npm install --prefer-offline --no-audit

      - name: Ensure Rollup Linux native package is installed
        working-directory: frontend
        run: npm install --no-save --no-audit --force @rollup/rollup-linux-x64-gnu@4.60.4

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://survey-application-tawny.vercel.app/
          VITE_QUIZ_APP_URL: https://syedishaq.me/Exam

      - name: Add SPA fallback for client-side routing
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
